<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset1="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVM MACHINE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="evm-card">
        <h1>
            EVM machine
        </h1>
        <div class="officer-space">
            
            <p class="lock">
                🔴 Voting Status : LOCKED
            </p>
            <button class="open">
                🟢 Open Ballot
            </button>
            <button class="close">
                🔴 Close Ballot
            </button>
        </div>
        <div class="Candidate">
            <div class="block-1">
                <h3>
              Maggi Lovers Party
            </h3>
             <p>
                   votes:- <span>0</span>
                </p>
                <button>
                      👆 Vote
                </button>        
            </div>
            <div class="block-2">
                <h3>
                Pizza Party
            </h3>
              <p>
                   votes:- <span>0</span>
                </p>
                <button>
                    👆 Vote
                </button>
            </div>
            <div class="block-3">
                <h3>
                   Javascript janta party
               </h3>
                 <p>
                      votes:- <span>0</span>
                   </p>
                   <button>
                         👆 Vote
                   </button>
            </div>
            <div class="block-4">
                <h3>
                  Python janta party
              </h3>
                <p>
                     votes:- <span>0</span>
                  </p>
                  <button>
                        👆 Vote
                  </button>
            </div>
            </div>
        <br>
        <div class="winner-block">
             <button class="btn1">
            Show result
        </button>
        <button class="btn2">
            Reset
        </button>
         <p>
           Winner : <span>------</span>
        </p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
